name: Feature request
description: Propose a Project G feature
title: "[FEATURE] "
labels:
  - "type:feature"
body:
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: User or business value
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and safety considerations
